name: audio_call
description: "Demonstrates how to use the flutter_voximplant plugin."
publish_to: none

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_voximplant:
    path: ..
  shared_preferences: 2.5.3
  get_it: 9.2.1
  permission_handler: 11.4.0

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
